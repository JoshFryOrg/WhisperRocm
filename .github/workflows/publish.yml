name: Publish

on:
    push:
        branches:
            - main
    schedule:
        # Weekly, Sunday 00:30 UTC, to pick up upstream whisper.cpp and base-image updates.
        - cron: '30 0 * * 0'
    workflow_dispatch:

jobs:
    docker:
        runs-on: ubuntu-latest

        # Build both backends in parallel: the HIP/ROCm image (:latest) and the
        # Vulkan image (:vulkan). fail-fast off so one backend failing doesn't
        # cancel the other's publish.
        strategy:
            fail-fast: false
            matrix:
                include:
                    - dockerfile: 'Dockerfile'
                      tag: 'latest'
                    - dockerfile: 'Dockerfile.vulkan'
                      tag: 'vulkan'

        env:
            DOCKERFILE_CONTEXT: '.'
            DOCKER_IMAGE_NAME: 'whisper-rocm'
            DOCKER_REGISTRY: 'joshfryup'
            DOCKER_USERNAME: 'joshfryup'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Docker Registry
              uses: docker/login-action@v4
              with:
                username: ${{ env.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v7
              with:
                file: ${{ matrix.dockerfile }}
                context: ${{ env.DOCKERFILE_CONTEXT }}
                push: true
                tags: |
                  ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.tag }}
