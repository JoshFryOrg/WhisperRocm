name: Publish (Vulkan)

on:
    push:
        branches:
            - main
        # Only rebuild the Vulkan image when its own inputs change. supervisor.py is
        # baked into both images, so it triggers this and the ROCm workflow.
        paths:
            - 'Dockerfile.vulkan'
            - 'supervisor.py'
    schedule:
        # Weekly, Sunday 00:30 UTC, to pick up upstream whisper.cpp and base-image updates.
        - cron: '30 0 * * 0'
    workflow_dispatch:

jobs:
    docker:
        runs-on: ubuntu-latest

        env:
            DOCKERFILE_PATH: 'Dockerfile.vulkan'
            DOCKERFILE_CONTEXT: '.'
            DOCKER_IMAGE_NAME: 'whisper-rocm'
            DOCKER_REGISTRY: 'joshfryup'
            DOCKER_USERNAME: 'joshfryup'
            DOCKER_TAG: 'vulkan'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Docker Registry
              uses: docker/login-action@v4
              with:
                username: ${{ env.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v7
              with:
                file: ${{ env.DOCKERFILE_PATH }}
                context: ${{ env.DOCKERFILE_CONTEXT }}
                push: true
                tags: |
                  ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_TAG }}
